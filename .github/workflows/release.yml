name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archives
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git archive --format=tar.gz --prefix=proxy-web-${TAG}/ -o proxy-web-${TAG}-src.tar.gz HEAD
          git archive --format=zip    --prefix=proxy-web-${TAG}/ -o proxy-web-${TAG}-src.zip    HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            Source release ${{ steps.version.outputs.tag }}
          files: |
            proxy-web-${{ steps.version.outputs.tag }}-src.tar.gz
            proxy-web-${{ steps.version.outputs.tag }}-src.zip
