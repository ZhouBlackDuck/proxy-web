name: Docker Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ghcr.io/zhoublackduck/proxy-web:${{ github.ref_name }}-${{ matrix.platform }}
            ghcr.io/zhoublackduck/proxy-web:latest-${{ matrix.platform }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          TAG: ${{ github.ref_name }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/zhoublackduck/proxy-web:$TAG \
            ghcr.io/zhoublackduck/proxy-web:${TAG}-linux/amd64 \
            ghcr.io/zhoublackduck/proxy-web:${TAG}-linux/arm64

          docker buildx imagetools create \
            -t ghcr.io/zhoublackduck/proxy-web:latest \
            ghcr.io/zhoublackduck/proxy-web:latest-linux/amd64 \
            ghcr.io/zhoublackduck/proxy-web:latest-linux/arm64
